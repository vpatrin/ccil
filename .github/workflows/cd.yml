name: CD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit SHA on main to deploy"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/vpatrin/ccil
  IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('sha-{0}', inputs.commit) || github.ref_name }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.ref }}

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

  deploy:
    needs: [build-push]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: IMAGE_TAG
          script: |
            cd /home/deploy/ccil
            git fetch origin main --no-tags
            IMAGE_TAG="$IMAGE_TAG" docker compose pull
            IMAGE_TAG="$IMAGE_TAG" docker compose up -d
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
