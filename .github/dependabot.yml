version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly }
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /
    schedule: { interval: weekly }
    ignore:
      - dependency-name: node
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
    groups:
      minor-and-patch:
        update-types: [minor, patch]
