name: ccil
services:
  ccil:
    image: ghcr.io/vpatrin/ccil:${IMAGE_TAG:-latest}
    container_name: ccil
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    tmpfs:
      - /app/.next/cache:noexec,nosuid,size=64m
      - /tmp:noexec,nosuid,size=64m
    restart: unless-stopped
    mem_limit: 256m
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    external: true
